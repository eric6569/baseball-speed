<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>棒球測速器 ⚾</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; background: #000; overflow: hidden;
      font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
      color: #fff;
    }
    #stage { position: fixed; inset: 0; }
    #cam, #overlay {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    #cam { background: #000; }
    #overlay { pointer-events: none; }

    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px 14px; font-size: 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,.6), rgba(0,0,0,0));
      z-index: 10; pointer-events: none; white-space: pre-line;
    }
    #startBtn {
      position: fixed; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      padding: 18px 36px; font-size: 20px; font-weight: bold;
      color: #fff; background: #e63946; border: none; border-radius: 999px;
      box-shadow: 0 6px 20px rgba(230,57,70,.5);
      z-index: 20; cursor: pointer;
    }
    #startBtn:active { transform: translate(-50%, -50%) scale(.96); }
    #startBtn:disabled { background: #888; box-shadow: none; }
    /* 大字讀數（距離 / 速度） */
    #bigReadout {
      position: fixed; left: 0; right: 0; top: 46px;
      text-align: center; z-index: 12; pointer-events: none;
      font-weight: 900; color: #39ff14;
      text-shadow: 0 2px 8px rgba(0,0,0,.9), 0 0 4px rgba(0,0,0,.9);
      line-height: 1.1;
    }
    #bigReadout .num { font-size: 13vw; }
    #bigReadout .unit { font-size: 5vw; }
    #bigReadout .sub { font-size: 4vw; color:#fff; opacity:.85; display:block; }
    #version {
      position: fixed; right: 6px; bottom: 4px;
      font-size: 12px; color: #fff; opacity: .6;
      z-index: 40; pointer-events: none;
    }
    #error {
      position: fixed; left: 50%; top: 60%; transform: translateX(-50%);
      width: 86%; max-width: 420px; padding: 14px 16px;
      font-size: 14px; line-height: 1.6; color: #ffd9d9;
      background: rgba(120,0,0,.85); border-radius: 12px;
      z-index: 30; display: none; white-space: pre-wrap;
    }
    /* 控制面板 */
    #panel {
      position: fixed; left: 0; right: 0; bottom: 0;
      padding: 10px 14px 16px;
      background: linear-gradient(to top, rgba(0,0,0,.7), rgba(0,0,0,0));
      z-index: 15; display: none;
      font-size: 13px;
    }
    #panel.show { display: block; }
    .row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
    .row label { width: 88px; flex: none; }
    .row input[type=range] { flex: 1; }
    .row .val { width: 44px; text-align: right; font-variant-numeric: tabular-nums; }
    .row.chk { gap: 6px; }
  </style>
</head>
<body>
  <div id="stage">
    <video  id="cam" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="status">📷 等待啟動…</div>
  <div id="bigReadout"></div>
  <div id="version">v0.4.0</div>
  <button id="startBtn">▶ 開啟後鏡頭</button>
  <div id="error"></div>

  <div id="panel">
    <div class="row" style="gap:8px">
      <button id="motionBtn" style="flex:1;padding:8px;border:none;border-radius:8px;background:#e76f51;color:#fff;font-weight:bold">🏃 動態偵測（實際用）</button>
    </div>
    <div class="row" style="gap:8px">
      <button id="calibBtn" style="flex:1;padding:8px;border:none;border-radius:8px;background:#457b9d;color:#fff;font-weight:bold">📏 焦距校正</button>
      <span id="calibState" style="flex:none">未校正</span>
    </div>
    <div id="rowCalib" class="row" style="display:none;gap:6px">
      <label style="width:auto">已知距離cm</label>
      <input type="number" id="calibDist" value="300" style="width:64px;padding:4px">
      <button id="calibCapture" style="flex:1;padding:6px;border:none;border-radius:8px;background:#2a9d8f;color:#fff">擷取目前直徑</button>
    </div>
    <div class="row" style="gap:8px">
      <button id="pickBtn" style="flex:1;padding:8px;border:none;border-radius:8px;background:#2a9d8f;color:#fff;font-weight:bold">🎯 點球鎖定顏色</button>
      <button id="resetBtn" style="flex:none;padding:8px 12px;border:none;border-radius:8px;background:#555;color:#fff">改用亮度</button>
    </div>
    <div id="rowMotion" class="row" style="display:none">
      <label>移動靈敏度</label>
      <input type="range" id="thMot" min="8" max="80" value="25">
      <span class="val" id="vMot">25</span>
    </div>
    <div id="rowBright" class="row">
      <label>亮度門檻</label>
      <input type="range" id="thBright" min="120" max="255" value="200">
      <span class="val" id="vBright">200</span>
    </div>
    <div id="rowSat" class="row">
      <label>飽和度上限</label>
      <input type="range" id="thSat" min="0" max="150" value="60">
      <span class="val" id="vSat">60</span>
    </div>
    <div id="rowTol" class="row" style="display:none">
      <label>顏色容差</label>
      <input type="range" id="thTol" min="20" max="240" value="90">
      <span class="val" id="vTol">90</span>
    </div>
    <div class="row">
      <label>最小尺寸(px)</label>
      <input type="range" id="thMin" min="2" max="40" value="6">
      <span class="val" id="vMin">6</span>
    </div>
    <div class="row">
      <label>最大尺寸(px)</label>
      <input type="range" id="thMax" min="20" max="320" value="120">
      <span class="val" id="vMax">120</span>
    </div>
    <div class="row">
      <label>偵測範圍%</label>
      <input type="range" id="thRoi" min="20" max="100" value="45">
      <span class="val" id="vRoi">45</span>
    </div>
    <div class="row">
      <label>出手門檻km/h</label>
      <input type="range" id="thThrow" min="5" max="60" value="20">
      <span class="val" id="vThrow">20</span>
    </div>
    <div class="row chk">
      <input type="checkbox" id="showMask">
      <label for="showMask" style="width:auto">顯示偵測遮罩（除錯用）</label>
    </div>
    <div class="row chk">
      <input type="checkbox" id="voiceOn" checked>
      <label for="voiceOn" style="width:auto">🔊 語音報速</label>
    </div>
  </div>

  <script>
    const video    = document.getElementById('cam');
    const overlay  = document.getElementById('overlay');
    const ctx      = overlay.getContext('2d');
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const errorEl  = document.getElementById('error');
    const panel    = document.getElementById('panel');

    // 控制元件
    const thBright = document.getElementById('thBright');
    const thSat    = document.getElementById('thSat');
    const thMin    = document.getElementById('thMin');
    const thMax    = document.getElementById('thMax');
    const thRoi    = document.getElementById('thRoi');
    const thTol    = document.getElementById('thTol');
    const showMask = document.getElementById('showMask');
    const vBright  = document.getElementById('vBright');
    const vSat     = document.getElementById('vSat');
    const vMin     = document.getElementById('vMin');
    const vMax     = document.getElementById('vMax');
    const vRoi     = document.getElementById('vRoi');
    const vTol     = document.getElementById('vTol');
    const thMot    = document.getElementById('thMot');
    const vMot     = document.getElementById('vMot');
    const pickBtn  = document.getElementById('pickBtn');
    const resetBtn = document.getElementById('resetBtn');
    const motionBtn= document.getElementById('motionBtn');
    const rowBright= document.getElementById('rowBright');
    const rowSat   = document.getElementById('rowSat');
    const rowTol   = document.getElementById('rowTol');
    const rowMotion= document.getElementById('rowMotion');
    const bigReadout = document.getElementById('bigReadout');
    // 校正元件
    const calibBtn = document.getElementById('calibBtn');
    const calibState = document.getElementById('calibState');
    const rowCalib = document.getElementById('rowCalib');
    const calibDist = document.getElementById('calibDist');
    const calibCapture = document.getElementById('calibCapture');

    const thThrow  = document.getElementById('thThrow');
    const vThrow   = document.getElementById('vThrow');
    const voiceOn  = document.getElementById('voiceOn');

    const BALL_CM = 7.3;                 // 棒球直徑
    let focalPx = null;                  // 校正後焦距（像素）
    const recentDiams = [];              // 近期偵測直徑（校正用，取中位數）

    // ---- 速度量測狀態 ----
    let track = [];           // 一次飛行中的 {t, d(公尺)} 取樣
    let throwActive = false;  // 是否在一次投球進行中
    let throwMax = 0;         // 本次投球最高速 km/h
    let lastSpeed = null;     // 最後完成的一次球速 km/h
    let lastDetectT = 0;      // 上次偵測到球的時間

    // ---- 語音報速（Web Speech API）----
    function speak(kmh){
      if(!voiceOn.checked || !window.speechSynthesis) return;
      try {
        const u = new SpeechSynthesisUtterance(`時速 ${Math.round(kmh)} 公里`);
        u.lang = 'zh-TW'; u.rate = 1.0;
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      } catch(e){}
    }
    // iOS 需在使用者手勢中先「喚醒」語音引擎
    function warmupVoice(){
      if(!window.speechSynthesis) return;
      try { const w=new SpeechSynthesisUtterance(' '); w.volume=0; speechSynthesis.speak(w); } catch(e){}
    }

    function median(arr){
      if(!arr.length) return null;
      const s=[...arr].sort((a,b)=>a-b);
      return s[s.length>>1];
    }

    // 滑桿同步顯示 + 存設定
    function bind(sl, lab){ sl.oninput = () => { lab.textContent = sl.value; saveSettings(); }; }
    bind(thMot,vMot); bind(thBright,vBright); bind(thSat,vSat);
    bind(thMin,vMin); bind(thMax,vMax); bind(thRoi,vRoi); bind(thTol,vTol);
    bind(thThrow,vThrow);

    // ---- 設定持久化（localStorage）----
    const LS_KEY = 'ballspeed_settings_v1';
    function saveSettings(){
      try {
        localStorage.setItem(LS_KEY, JSON.stringify({
          mode, focalPx, calibDist: calibDist.value,
          thMot:thMot.value, thBright:thBright.value, thSat:thSat.value,
          thMin:thMin.value, thMax:thMax.value, thRoi:thRoi.value, thTol:thTol.value,
          thThrow:thThrow.value
        }));
      } catch(e){}
    }
    function loadSettings(){
      let s; try { s = JSON.parse(localStorage.getItem(LS_KEY)); } catch(e){}
      if(!s) return;
      const set=(el,lab,v)=>{ if(v!=null){ el.value=v; if(lab)lab.textContent=v; } };
      set(thMot,vMot,s.thMot); set(thBright,vBright,s.thBright); set(thSat,vSat,s.thSat);
      set(thMin,vMin,s.thMin); set(thMax,vMax,s.thMax); set(thRoi,vRoi,s.thRoi); set(thTol,vTol,s.thTol);
      set(thThrow,vThrow,s.thThrow);
      if(s.calibDist!=null) calibDist.value=s.calibDist;
      if(s.focalPx){ focalPx=s.focalPx; calibState.textContent='✓ 已校正'; }
      if(s.mode){ mode=s.mode; applyMode(); }
    }
    function applyMode(){
      rowBright.style.display = mode==='bright'?'flex':'none';
      rowSat.style.display    = mode==='bright'?'flex':'none';
      rowTol.style.display    = mode==='color' ?'flex':'none';
      rowMotion.style.display = mode==='motion'?'flex':'none';
    }

    // ---- 校正流程 ----
    calibBtn.addEventListener('click', () => {
      rowCalib.style.display = rowCalib.style.display==='none' ? 'flex' : 'none';
    });
    calibCapture.addEventListener('click', () => {
      const d = median(recentDiams);
      const known = parseFloat(calibDist.value);
      if(!d){ calibState.textContent='⚠ 先讓球被偵測到'; return; }
      if(!known || known<=0){ calibState.textContent='⚠ 距離無效'; return; }
      focalPx = d * known / BALL_CM;
      calibState.textContent = `✓ 已校正 (${focalPx.toFixed(0)}px)`;
      saveSettings();
    });

    // 偵測模式：'bright' 亮度 / 'color' 鎖定顏色
    let mode = 'bright';
    let targetColor = null;       // {r,g,b}
    let pickMode = false;         // 等待使用者點球

    pickBtn.addEventListener('click', () => {
      pickMode = true;
      pickBtn.textContent = '👆 請點畫面中的球…';
    });
    resetBtn.addEventListener('click', () => {
      mode='bright'; targetColor=null;
      applyMode(); pickBtn.textContent='🎯 點球鎖定顏色'; saveSettings();
    });
    motionBtn.addEventListener('click', () => {
      mode='motion'; applyMode(); saveSettings();
    });

    // 點畫面取色（換算 object-fit:cover 座標 → proc 像素）
    document.getElementById('stage').addEventListener('click', (ev) => {
      if (!pickMode || !video.videoWidth) return;
      const elW=overlay.clientWidth, elH=overlay.clientHeight;
      const vw=video.videoWidth, vh=video.videoHeight;
      const scale=Math.max(elW/vw, elH/vh);
      const offX=(elW-vw*scale)/2, offY=(elH-vh*scale)/2;
      const vidX=(ev.clientX-offX)/scale, vidY=(ev.clientY-offY)/scale;
      const px=Math.round(vidX*proc.width/vw), py=Math.round(vidY*proc.height/vh);
      pctx.drawImage(video,0,0,proc.width,proc.height);
      // 取點擊處 5×5 平均色，較穩定
      let r=0,g=0,b=0,n=0;
      for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
        const x=px+dx,y=py+dy;
        if(x<0||y<0||x>=proc.width||y>=proc.height)continue;
        const d=pctx.getImageData(x,y,1,1).data;
        r+=d[0];g+=d[1];b+=d[2];n++;
      }
      if(n>0){
        targetColor={r:r/n,g:g/n,b:b/n};
        mode='color'; pickMode=false; applyMode(); saveSettings();
        pickBtn.textContent=`✓ 已鎖定 rgb(${targetColor.r|0},${targetColor.g|0},${targetColor.b|0})`;
      }
    });

    let stream = null, running = false, lastT = performance.now();
    let prevGray = null, motionBuf = null;   // 動態偵測用的前後幀灰階緩衝

    // 離螢幕處理用 canvas（降解析度加速）
    const PROC_W = 320;
    let PROC_H = 180;
    const proc = document.createElement('canvas');
    const pctx = proc.getContext('2d', { willReadFrequently: true });

    function setStatus(t){ statusEl.textContent = t; }
    function showError(m){ errorEl.style.display='block'; errorEl.textContent='⚠ '+m; }

    // ---- 開鏡頭 ----
    async function startCamera() {
      errorEl.style.display='none';
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showError('此瀏覽器無法存取鏡頭。\n請用 HTTPS（GitHub Pages）或 localhost，手機勿用區網 IP。');
        return;
      }
      startBtn.disabled = true; setStatus('📷 啟動鏡頭中…');
      warmupVoice();   // 在使用者點擊手勢中喚醒語音（iOS 必要）
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { exact: 'environment' } }, audio: false });
      } catch (e1) {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }, audio: false });
        } catch (e2) { handleCameraError(e2); return; }
      }
      video.srcObject = stream;
      await video.play();
      startBtn.style.display='none';
      panel.classList.add('show');
      loadSettings();   // 載入上次調好的參數與校正值

      await waitForVideoReady();
      syncSize();
      window.addEventListener('resize', syncSize);

      running = true;
      setStatus('✅ 偵測中…');
      detectLoop();
    }

    function waitForVideoReady(){
      return new Promise(r=>{
        if (video.readyState>=2 && video.videoWidth) return r();
        video.onloadedmetadata = ()=>r();
      });
    }

    function syncSize(){
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!vw||!vh) return;
      overlay.width = vw; overlay.height = vh;          // 疊圖用影像原始座標
      PROC_H = Math.round(PROC_W * vh / vw);
      proc.width = PROC_W; proc.height = PROC_H;
    }

    // ---- 偵測迴圈：找白色圓形 blob ----
    const visited = new Uint8Array(PROC_W * 1080); // 上限緩衝（之後依實際大小用）
    function detectLoop(){
      if (!running) return;
      const ball = detectBall();
      draw(ball);
      requestAnimationFrame(detectLoop);
    }

    function detectBall(){
      const W = proc.width, H = proc.height, N = W*H;
      pctx.drawImage(video, 0, 0, W, H);
      const data = pctx.getImageData(0, 0, W, H).data;

      const TB = +thBright.value;   // 亮度下限
      const TS = +thSat.value;      // 飽和度上限（越小越「純白」）

      // 中央偵測框（ROI）：框外像素一律忽略
      const roi = +thRoi.value/100;
      const rx0 = Math.floor(W*(1-roi)/2), rx1 = Math.ceil(W*(1+roi)/2);
      const ry0 = Math.floor(H*(1-roi)/2), ry1 = Math.ceil(H*(1+roi)/2);

      const TOL = +thTol.value;     // 顏色容差
      const MT  = +thMot.value;     // 移動靈敏度（灰階差門檻）
      const useColor  = (mode==='color' && targetColor);
      const useMotion = (mode==='motion');
      const tr=useColor?targetColor.r:0, tg=useColor?targetColor.g:0, tb=useColor?targetColor.b:0;

      // 動態模式：本幀灰階緩衝（與 prevGray 比較後互換）
      let gray = null;
      if (useMotion){
        gray = (motionBuf && motionBuf.length===N) ? motionBuf : new Uint8Array(N);
      }

      // 建立遮罩（僅限 ROI 內）
      const mask = new Uint8Array(N);
      for (let y=ry0;y<ry1;y++){
        for (let x=rx0;x<rx1;x++){
          const i=y*W+x;
          const r=data[i*4], g=data[i*4+1], b=data[i*4+2];
          if (useMotion){
            const gv=(r*0.299+g*0.587+b*0.114)|0;
            if (prevGray && prevGray.length===N && Math.abs(gv-prevGray[i])>MT) mask[i]=1;
            gray[i]=gv;
          } else if (useColor){
            const dist=Math.abs(r-tr)+Math.abs(g-tg)+Math.abs(b-tb);
            if (dist<=TOL) mask[i]=1;
          } else {
            const max=Math.max(r,g,b), min=Math.min(r,g,b);
            if (max>=TB && (max-min)<=TS) mask[i]=1;
          }
        }
      }
      // 換手：本幀灰階成為下一幀的 prevGray
      if (useMotion){ motionBuf = prevGray; prevGray = gray; }

      // 連通元件（BFS），找最大且夠圓的 blob
      const vis = (N<=visited.length) ? visited : new Uint8Array(N);
      vis.fill(0, 0, N);
      const stack = new Int32Array(N);
      const minPx = +thMin.value;
      const maxPx = +thMax.value;
      let best = null, bestScore = -1;

      for (let s=0;s<N;s++){
        if (!mask[s] || vis[s]) continue;
        let sp=0; stack[sp++]=s; vis[s]=1;
        let area=0, minX=W,maxX=0,minY=H,maxY=0, sumX=0,sumY=0;
        while (sp>0){
          const p=stack[--sp];
          const x=p%W, y=(p/W)|0;
          area++; sumX+=x; sumY+=y;
          if(x<minX)minX=x; if(x>maxX)maxX=x;
          if(y<minY)minY=y; if(y>maxY)maxY=y;
          // 4 鄰居
          if(x>0   && mask[p-1] && !vis[p-1]){vis[p-1]=1; stack[sp++]=p-1;}
          if(x<W-1 && mask[p+1] && !vis[p+1]){vis[p+1]=1; stack[sp++]=p+1;}
          if(y>0   && mask[p-W] && !vis[p-W]){vis[p-W]=1; stack[sp++]=p-W;}
          if(y<H-1 && mask[p+W] && !vis[p+W]){vis[p+W]=1; stack[sp++]=p+W;}
        }
        const bw=maxX-minX+1, bh=maxY-minY+1;
        if (bw<minPx || bh<minPx) continue;
        if (bw>maxPx || bh>maxPx) continue;          // 淘汰過大的背景區塊（牆/燈）
        // 圓形度：blob 面積 / 外接框面積（圓約 0.785，越接近越圓）
        const fill = area/(bw*bh);
        const aspect = bw>bh ? bw/bh : bh/bw;
        // 動態模式：移動殘影會拉長變形，放寬圓形限制
        const fillMin = useMotion ? 0.35 : 0.6;
        const aspMax  = useMotion ? 3.0  : 1.4;
        if (fill < fillMin || aspect > aspMax) continue;
        // 選「最圓」而非「最大」：越接近 0.785 且越方正分數越高
        const circ = (1 - Math.abs(fill - 0.785)) / aspect;
        if (circ > bestScore){
          bestScore = circ;
          best = { cx:sumX/area, cy:sumY/area, bw, bh, area, fill,
                   diam:(bw+bh)/2 };
        }
      }
      return { best, mask, W, H, roi:{rx0,ry0,rx1,ry1} };
    }

    function draw(res){
      const sx = overlay.width / res.W;   // proc → overlay 座標縮放
      const sy = overlay.height / res.H;
      ctx.clearRect(0,0,overlay.width,overlay.height);

      // 除錯遮罩
      if (showMask.checked){
        const img = ctx.createImageData(res.W, res.H);
        for (let i=0;i<res.W*res.H;i++){
          const v = res.mask[i]?255:0;
          img.data[i*4]=v; img.data[i*4+1]=v; img.data[i*4+2]=0; img.data[i*4+3]=v?140:0;
        }
        // 放到角落小窗
        const tmp = document.createElement('canvas');
        tmp.width=res.W; tmp.height=res.H;
        tmp.getContext('2d').putImageData(img,0,0);
        ctx.drawImage(tmp, 0,0, overlay.width, overlay.height);
      }

      // 中央偵測框指引線（虛線）
      const R=res.roi;
      ctx.lineWidth=2; ctx.setLineDash([12,10]); ctx.strokeStyle='rgba(255,255,255,.7)';
      ctx.strokeRect(R.rx0*sx, R.ry0*sy, (R.rx1-R.rx0)*sx, (R.ry1-R.ry0)*sy);
      ctx.setLineDash([]);

      const now=performance.now(), fps=1000/(now-lastT); lastT=now;
      const THROW_MIN = +thThrow.value;   // 出手判定門檻 km/h

      // 投球結束判定：球消失一段時間且本次有達到出手速度 → 定案 + 報速
      if (throwActive && (now - lastDetectT) > 350){
        if (throwMax >= THROW_MIN){
          lastSpeed = throwMax;
          speak(lastSpeed);
        }
        throwActive = false; throwMax = 0; track = [];
      }

      if (res.best){
        const b=res.best;
        const cx=b.cx*sx, cy=b.cy*sy;
        const rpx=(b.diam*((sx+sy)/2))/2;
        ctx.lineWidth=6; ctx.strokeStyle='#39ff14';
        ctx.beginPath(); ctx.arc(cx,cy,rpx,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle='#39ff14';
        ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fill();
        const diamOverlay = b.diam*((sx+sy)/2);

        // 累積近期直徑（給校正取中位數用）
        recentDiams.push(diamOverlay);
        if (recentDiams.length>30) recentDiams.shift();

        // 距離計算：distance_cm = focalPx × 球徑 / 像素直徑
        let distM = null;
        if (focalPx){ distM = (focalPx * BALL_CM / diamOverlay) / 100; }

        ctx.font='bold 26px sans-serif'; ctx.fillStyle='#39ff14';
        ctx.fillText(`⚾ ${diamOverlay.toFixed(0)}px`, cx+rpx+8, cy);

        // ---- 速度量測 ----
        let curKmh = null;
        if (distM!=null){
          track.push({ t:now, d:distM });
          while (track.length>1 && now-track[0].t>400) track.shift();  // 保留近 0.4s
          if (track.length>=2){
            const a=track[0], b=track[track.length-1];
            const dt=(b.t-a.t)/1000;
            if (dt>0.02){
              const v = Math.abs(b.d-a.d)/dt;     // m/s
              curKmh = v*3.6;
              if (curKmh >= THROW_MIN){
                throwActive = true;
                if (curKmh > throwMax) throwMax = curKmh;
              }
            }
          }
          lastDetectT = now;
        }
        updateBigReadout(throwActive ? throwMax : null);
        setStatus(`✅ ${fps.toFixed(0)}fps ${mode}\n⚾ ${diamOverlay.toFixed(0)}px`
          + (distM!=null?` 距離${distM.toFixed(2)}m`:' 尚未校正')
          + (curKmh!=null?` 即時${curKmh.toFixed(0)}km/h`:''));
      } else {
        updateBigReadout(null);
        setStatus(`✅ ${fps.toFixed(0)}fps ${mode}\n🔍 未偵測到球`);
      }
    }

    // 大字讀數：投球中顯示即時最高速，否則顯示最後一次球速
    function updateBigReadout(activeMax){
      if (activeMax!=null && activeMax>0){
        bigReadout.innerHTML = `<span class="num" style="color:#ffd60a">${activeMax.toFixed(0)}</span><span class="unit"> km/h</span><span class="sub">測量中…</span>`;
      } else if (lastSpeed!=null){
        bigReadout.innerHTML = `<span class="num">${lastSpeed.toFixed(0)}</span><span class="unit"> km/h</span><span class="sub">最後球速</span>`;
      } else {
        bigReadout.innerHTML = '';
      }
    }

    function handleCameraError(err){
      let msg;
      switch(err&&err.name){
        case 'NotAllowedError': msg='鏡頭權限被拒絕。請允許鏡頭後重新整理。'; break;
        case 'NotFoundError': msg='找不到鏡頭裝置。'; break;
        case 'NotReadableError': msg='鏡頭被其他 App 佔用。'; break;
        case 'OverconstrainedError': msg='此裝置不支援後鏡頭要求。'; break;
        default: msg='無法開啟鏡頭：'+(err&&err.message?err.message:err);
      }
      showError(msg); setStatus('❌ 鏡頭開啟失敗');
      startBtn.disabled=false; startBtn.style.display='block';
    }

    startBtn.addEventListener('click', startCamera);
  </script>
</body>
</html>
